<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap for card internals (slots, confirm table, etc.) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three":            "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/":    "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2/lib/three-vrm.module.min.js"
      }
    }
    </script>
  <title>AI Companion</title>
</head>

<body>
  <canvas id="vrm-canvas"></canvas>
  <div id="model-shadow"></div>
  <div id="transcript"></div>
  <button id="config-btn" type="button" aria-label="Configure API key and system instruction">Settings</button>
  <div id="config-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="config-title">
    <div class="config-panel">
      <div class="config-header">
        <h2 id="config-title">Connect Your Google AI Studio Key</h2>
        <button id="config-close" type="button" aria-label="Close">×</button>
      </div>
      <p class="config-help">
        To get a key: open
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noreferrer">Google AI Studio</a>,
        create an API key, then paste it below.
      </p>
      <label class="config-label" for="api-key-input">API key</label>
      <input id="api-key-input" type="password" placeholder="Paste your Google AI Studio API key" autocomplete="off" />
      <label class="config-label" for="system-instruction-input">System instruction (optional)</label>
      <textarea id="system-instruction-input" rows="6"
        placeholder="Leave empty to use the default assistant personality."></textarea>
      <div class="config-actions">
        <button id="config-save" type="button">Save &amp; Continue</button>
      </div>
      <p class="config-note">Your key is stored in this browser only.</p>
    </div>
  </div>
  <button id="btn"><span id="btn-label">Start</span></button>
  <p id="status"></p>
  <div id="card" class="hidden"></div>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <script src="/static/chat.js"></script>
  <script type="module" src="/static/vrm.js"></script>
</body>

</html>
